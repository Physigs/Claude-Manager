name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check if version changed
        id: version_check
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          git show HEAD^:package.json > prev-package.json 2>/dev/null || echo '{}' > prev-package.json
          PREVIOUS=$(node -p "require('./prev-package.json').version || ''")
          rm -f prev-package.json
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package app
        if: steps.version_check.outputs.changed == 'true'
        run: npm run package

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version_check.outputs.current }}" \
            "release/claude-launcher.exe" \
            --title "v${{ steps.version_check.outputs.current }}" \
            --notes "Automated build from commit ${{ github.sha }}"
